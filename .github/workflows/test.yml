name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Check Python syntax
        run: |
          python3 -m py_compile skills/model-failover-guard/scripts/failover.py

      - name: Check JSON config is valid
        run: |
          python3 -m json.tool skills/model-failover-guard/config.example.json > /dev/null

      - name: Check SKILL.md exists and has frontmatter
        run: |
          head -3 skills/model-failover-guard/SKILL.md | grep -q "^---" && \
          grep -q "^name: " skills/model-failover-guard/SKILL.md && \
          grep -q "^description: " skills/model-failover-guard/SKILL.md && \
          echo "SKILL.md frontmatter OK"